@let a = alert();
<div
  class="card w-full flex items-center gap-[1.6rem] md:gap-[2.4rem] p-[1.6rem] md:p-[2.4rem] lg:p-[3.2rem]"
  role="button"
  tabindex="0"
  [attr.aria-label]="a.title + ', view details'"
  (click)="activate()"
  (keydown.enter)="activate($event)"
  (keydown.space)="activate($event)">
  <div class="flex-1 min-w-0 flex flex-col gap-[1.6rem]">
    <div class="flex flex-col gap-[0.8rem]">
      <div class="card-heading">
        <h3 class="card-title">{{ a.title }}</h3>
      </div>
      <div class="card-details">
        <p class="card-routes">
          {{ a.routeNames.length ? a.routeNames.join(', ') : 'System-wide' }}
        </p>
      </div>
    </div>
    <div class="card-pill-row flex flex-wrap items-center gap-[0.8rem]">
      <span
        class="card-pill card-pill-type"
        [style.background]="a.badgeBg"
        [style.color]="a.badgeText">
        {{ a.typeName }}
      </span>
      <span class="card-pill">{{ a.effectiveDate | dateRange: a.expirationDate }}</span>
    </div>
  </div>
  <mat-icon svgIcon="chevron-right" class="card-chevron shrink-0" aria-hidden="true"/>
</div>
